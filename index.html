<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANBU - Rádio de Emergência</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: sans-serif; overflow: hidden; }
        .neon-panic { 
            animation: pulse-neon 0.5s infinite alternate; 
            border: 4px solid #ff0000 !important;
            box-shadow: 0 0 25px #ff0000, inset 0 0 20px #ff0000 !important;
            background: #450a0a !important;
        }
        @keyframes pulse-neon { from { opacity: 0.9; transform: scale(1); } to { opacity: 1; transform: scale(1.03); } }
        .online-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 8px #22c55e; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <audio id="alarmSound" src="https://raw.githubusercontent.com/Dellzito/Bot-o-do-panico/main/cebolinha-bobo-do-outro-lado.mp3" preload="auto" loop></audio>

    <div id="login-screen" class="bg-slate-900 p-8 rounded-2xl border border-slate-800 shadow-2xl w-full max-w-sm z-50 text-center">
        <h1 class="text-2xl font-bold text-red-500 mb-6 uppercase italic font-black">Frequência ANBU</h1>
        <input id="nick-input" type="text" placeholder="SEU NICK" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 mb-4 text-white font-bold uppercase">
        <button id="btn-entrar" class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-xl font-bold transition shadow-lg shadow-red-900/40">CONECTAR RÁDIO</button>
        <p class="text-[10px] text-gray-500 mt-4 uppercase">Sinal estabilizado</p>
    </div>

    <div id="radio-panel" class="hidden w-full max-w-2xl space-y-4">
        <div id="main-card" class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-2xl transition-all duration-300">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Operador na Escuta</h2>
                    <p id="display-nick" class="text-xl font-black text-white italic uppercase"></p>
                </div>
                <div class="flex gap-2">
                    <button onclick="fazerPopOut()" class="p-3 bg-slate-800 rounded-xl border border-slate-700 text-blue-400 hover:bg-slate-700" title="Destacar Janelinha">🔲</button>
                    <button onclick="toggleAudioManualmente()" id="audio-btn" class="p-3 bg-slate-800 rounded-xl border border-slate-700 hover:bg-slate-700" title="Ligar/Desligar Som">🔇</button>
                </div>
            </div>

            <button id="main-panic-btn" class="w-full py-20 rounded-2xl bg-slate-950 border-2 border-slate-800 text-2xl font-black text-slate-800 transition-all active:scale-95 shadow-inner">
                🚨 DISPARAR PÂNICO
            </button>

            <div id="panic-msg" class="hidden mt-6 p-4 bg-red-600 text-white rounded-xl text-center font-black animate-bounce text-xl border-2 border-white">
                SINAL DE APOIO DETECTADO!
            </div>
        </div>

        <div class="bg-slate-900/50 border border-slate-800 rounded-3xl p-4">
            <div id="online-list" class="flex flex-wrap gap-2 text-xs"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-QaPr7O6RkWR3vpXCg4zrnUWw3TzU9ss",
            authDomain: "g-2cb53.firebaseapp.com",
            projectId: "g-2cb53",
            storageBucket: "g-2cb53.firebasestorage.app",
            messagingSenderId: "292095146978",
            appId: "1:292095146978:web:836d833230907d081017bb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let meuNick = "";
        let audioHabilitado = false;
        const audioTag = document.getElementById("alarmSound");

        // VERIFICA SE É A JANELA POP-OUT ANTES DE CARREGAR A TELA DE LOGIN
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('popout')) {
            meuNick = urlParams.get('nick');
            document.getElementById('login-screen').classList.add('hidden');
            configurarModoPopOut();
        }

        // LÓGICA DE LOGIN DA ABA PRINCIPAL
        const btnEntrar = document.getElementById('btn-entrar');
        if (btnEntrar) {
            btnEntrar.addEventListener('click', () => {
                const nick = document.getElementById('nick-input').value.trim().toUpperCase();
                if(!nick) return alert("Identifique-se, Ninja!");
                
                meuNick = nick;

                // DESBLOQUEIO DE ÁUDIO SILENCIOSO (Volume 0)
                audioTag.volume = 0; 
                audioTag.play().then(() => {
                    audioTag.pause();
                    audioTag.currentTime = 0;
                    audioTag.volume = 1; // Retorna o volume ao normal
                    audioHabilitado = true;
                    finalizarLogin();
                }).catch(e => {
                    console.error("Erro no áudio automático:", e);
                    audioHabilitado = false; 
                    finalizarLogin();
                    alert("O navegador bloqueou o áudio. Clique no ícone de 🔇 após entrar para liberar.");
                });
            });
        }

        function finalizarLogin() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('radio-panel').classList.remove('hidden');
            document.getElementById('display-nick').textContent = meuNick;
            
            atualizarBtnAudio();
            iniciarMonitoramento();
            atualizarPresenca(true);
            setInterval(() => atualizarPresenca(true), 30000);
        }

        window.toggleAudioManualmente = () => {
            audioHabilitado = !audioHabilitado;
            if(!audioHabilitado) {
                audioTag.pause();
                audioTag.currentTime = 0;
            } else {
                // Tenta destravar com o clique manual silencioso
                audioTag.volume = 0;
                audioTag.play().then(() => {
                    audioTag.pause();
                    audioTag.currentTime = 0;
                    audioTag.volume = 1;
                }).catch(e => console.log(e));
            }
            atualizarBtnAudio();
        };

        function atualizarBtnAudio() {
            const btn = document.getElementById('audio-btn');
            if(btn) {
                btn.textContent = audioHabilitado ? '🔊' : '🔇';
                btn.classList.toggle('border-green-500', audioHabilitado);
            }
        }

        // DISPARAR PÂNICO (Aba Principal)
        const btnPanic = document.getElementById('main-panic-btn');
        if (btnPanic) {
            btnPanic.addEventListener('click', dispararAlerta);
        }

        async function dispararAlerta() {
            if(!meuNick) return;
            const ref = doc(db, "panic_system", "status");
            await setDoc(ref, { ativo: true, por: meuNick, time: Date.now() });
            
            // Auto desliga o pânico em 15 segundos
            setTimeout(() => updateDoc(ref, { ativo: false }), 15000);
        }

        // ABRIR POP-OUT
        window.fazerPopOut = () => {
            const width = 250, height = 300;
            const left = window.screen.width - width;
            window.open(`${window.location.origin}${window.location.pathname}?popout=true&nick=${meuNick}`, 'ANBU_PANIC', `width=${width},height=${height},left=${left},top=0,menubar=no,toolbar=no,status=no`);
        };

        // RENDERIZAR E OUVIR A JANELINHA POP-OUT
        function configurarModoPopOut() {
            document.body.innerHTML = `
                <div id="popout-body" class="flex flex-col items-center justify-center h-screen bg-slate-950 p-4 border-4 border-slate-800 transition-all duration-300">
                    <p class="text-[10px] font-black mb-2 uppercase text-slate-500 italic">ANBU: ${meuNick}</p>
                    <button id="popout-btn" class="w-full h-full rounded-2xl bg-slate-900 text-slate-700 font-black text-2xl border-2 border-slate-800 active:scale-95 transition-all shadow-inner uppercase tracking-tighter">
                        🚨 PÂNICO
                    </button>
                    <p id="alert-name" class="hidden mt-2 text-white font-bold text-center text-[10px] uppercase italic animate-pulse"></p>
                </div>
            `;
            
            document.getElementById('popout-btn').addEventListener('click', dispararAlerta);

            // Escuta o Firebase para piscar a janelinha
            onSnapshot(doc(db, "panic_system", "status"), (snap) => {
                const d = snap.data();
                const body = document.getElementById('popout-body');
                const btn = document.getElementById('popout-btn');
                const name = document.getElementById('alert-name');
                if(d && d.ativo) {
                    body.classList.add('neon-panic');
                    btn.classList.add('bg-red-600', 'text-white', 'border-white');
                    name.classList.remove('hidden');
                    name.textContent = `APOIO: ${d.por}`;
                } else {
                    body.classList.remove('neon-panic');
                    btn.classList.remove('bg-red-600', 'text-white', 'border-white');
                    name.classList.add('hidden');
                }
            });
        }

        // ESCUTAR O BANCO DE DADOS (ABA PRINCIPAL)
        function iniciarMonitoramento() {
            onSnapshot(doc(db, "panic_system", "status"), (snap) => {
                const data = snap.data();
                const btn = document.getElementById('main-panic-btn');
                const card = document.getElementById('main-card');
                const msg = document.getElementById('panic-msg');
                
                if(data && data.ativo) {
                    // Pânico Ativado!
                    card.classList.add('neon-panic');
                    btn.classList.add('text-white', 'border-white');
                    btn.innerHTML = `🚨 APOIAR: ${data.por}!`;
                    msg.classList.remove('hidden');
                    msg.innerHTML = `ANBU <b>${data.por}</b> SOLICITA AJUDA!`;
                    
                    if(audioHabilitado) {
                        audioTag.currentTime = 0;
                        audioTag.play().catch(e => console.log("Áudio bloqueado:", e));
                    }
                } else {
                    // Pânico Desativado
                    card.classList.remove('neon-panic');
                    btn.classList.remove('text-white', 'border-white');
                    btn.innerHTML = "🚨 DISPARAR PÂNICO";
                    msg.classList.add('hidden');
                    
                    audioTag.pause();
                    audioTag.currentTime = 0;
                }
            });

            // Monitorar lista online
            onSnapshot(collection(db, "presenca_radio"), (snap) => {
                const lista = document.getElementById('online-list');
                lista.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.online && (Date.now() - d.timestamp < 60000)) {
                        lista.innerHTML += `<div class="bg-slate-800 px-2 py-1 rounded border border-slate-700 flex items-center"><span class="online-dot"></span>${d.id}</div>`;
                    }
                });
            });
        }

        // ATUALIZAR STATUS ONLINE (HEARTBEAT)
        async function atualizarPresenca(status) {
            if(!meuNick) return;
            await setDoc(doc(db, "presenca_radio", meuNick), { id: meuNick, online: status, timestamp: Date.now() }, { merge: true });
        }

        // LIMPAR PRESENÇA AO FECHAR A ABA
        window.addEventListener('beforeunload', () => atualizarPresenca(false));
    </script>
</body>
</html>
