<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANBU - Rádio de Emergência</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: sans-serif; overflow: hidden; }
        
        .neon-panic { 
            animation: pulse-neon 0.5s infinite alternate; 
            border: 4px solid #ff0000 !important;
            box-shadow: 0 0 25px #ff0000, inset 0 0 20px #ff0000 !important;
            background: #450a0a !important;
        }

        @keyframes pulse-neon {
            from { opacity: 0.9; transform: scale(1); }
            to { opacity: 1; transform: scale(1.03); }
        }

        .online-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 8px #22c55e; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <audio id="alarmSound" src="https://raw.githubusercontent.com/Dellzito/Bot-o-do-panico/main/cebolinha-bobo-do-outro-lado.mp3" preload="auto" loop></audio>

    <div id="login-screen" class="bg-slate-900 p-8 rounded-2xl border border-slate-800 shadow-2xl w-full max-w-sm z-50 text-center">
        <h1 class="text-2xl font-bold text-red-500 mb-6 uppercase tracking-tighter italic font-black">Frequência ANBU</h1>
        <input id="nick-input" type="text" placeholder="SEU NICK" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 mb-4 focus:outline-none focus:border-red-500 text-white font-bold uppercase">
        <button onclick="entrarNoRadio()" class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-xl font-bold transition shadow-lg shadow-red-900/40">CONECTAR RÁDIO</button>
        <p class="text-[10px] text-gray-500 mt-4 uppercase">O som será ativado ao conectar</p>
    </div>

    <div id="radio-panel" class="hidden w-full max-w-2xl space-y-4">
        <div id="main-card" class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-2xl transition-all duration-300">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Operador logado</h2>
                    <p id="display-nick" class="text-xl font-black text-white italic uppercase"></p>
                </div>
                <div class="flex gap-2">
                    <button onclick="fazerPopOut()" class="p-3 bg-slate-800 rounded-xl border border-slate-700 text-blue-400 hover:bg-slate-700" title="Abrir Janela Pequena">🔲</button>
                    <button onclick="toggleAudio()" id="audio-btn" class="p-3 bg-slate-800 rounded-xl border border-slate-700 hover:bg-slate-700">🔇</button>
                </div>
            </div>

            <button id="main-panic-btn" onclick="dispararAlerta()" class="w-full py-20 rounded-2xl bg-slate-950 border-2 border-slate-800 text-2xl font-black text-slate-800 transition-all active:scale-95">
                🚨 DISPARAR PÂNICO
            </button>

            <div id="panic-msg" class="hidden mt-6 p-4 bg-red-600 text-white rounded-xl text-center font-black animate-bounce text-xl border-2 border-white">
                SINAL DE APOIO DETECTADO!
            </div>
        </div>

        <div class="bg-slate-900/50 border border-slate-800 rounded-3xl p-4">
            <div id="online-list" class="flex flex-wrap gap-2"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-QaPr7O6RkWR3vpXCg4zrnUWw3TzU9ss",
            authDomain: "g-2cb53.firebaseapp.com",
            projectId: "g-2cb53",
            storageBucket: "g-2cb53.firebasestorage.app",
            messagingSenderId: "292095146978",
            appId: "1:292095146978:web:836d833230907d081017bb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let meuNick = "";
        let audioHabilitado = false;

        // FUNÇÃO DE PLAY (A QUE VOCÊ SUGERIU)
        function playAlarm() {
            let audio = document.getElementById("alarmSound");
            if(!audio || !audioHabilitado) return;
            audio.currentTime = 0;
            audio.play().catch(e => console.log("Erro ao tocar:", e));
        }

        // FUNÇÃO DE STOP (A QUE VOCÊ SUGERIU)
        function stopAlarm() {
            let audio = document.getElementById("alarmSound");
            if(!audio) return;
            audio.pause();
            audio.currentTime = 0;
        }

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('popout')) {
            meuNick = urlParams.get('nick');
            configurarModoPopOut();
        }

        window.entrarNoRadio = () => {
            const nick = document.getElementById('nick-input').value.trim().toUpperCase();
            if(!nick) return alert("Identifique-se!");
            
            meuNick = nick;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('radio-panel').classList.remove('hidden');
            document.getElementById('display-nick').textContent = meuNick;

            // TESTE E DESBLOQUEIO DE ÁUDIO NO LOGIN
            let audio = document.getElementById("alarmSound");
            audio.play().then(() => {
                audio.pause();
                audio.currentTime = 0;
                audioHabilitado = true;
                atualizarBtnAudio();
            }).catch(() => {
                alert("Clique no ícone de mudo (🔇) após entrar para ativar o som.");
            });
            
            iniciarMonitoramento();
            atualizarPresenca(true);
            setInterval(() => atualizarPresenca(true), 30000);
        };

        window.toggleAudio = () => {
            audioHabilitado = !audioHabilitado;
            atualizarBtnAudio();
            if(!audioHabilitado) stopAlarm();
        };

        function atualizarBtnAudio() {
            const btn = document.getElementById('audio-btn');
            if(btn) {
                btn.textContent = audioHabilitado ? '🔊' : '🔇';
                btn.classList.toggle('border-green-500', audioHabilitado);
            }
        }

        window.dispararAlerta = async () => {
            const ref = doc(db, "panic_system", "status");
            await setDoc(ref, { ativo: true, por: meuNick, time: Date.now() });
            setTimeout(() => updateDoc(ref, { ativo: false }), 12000);
        };

        window.fazerPopOut = () => {
            const width = 250, height = 300;
            const left = window.screen.width - width;
            window.open(`${window.location.origin}${window.location.pathname}?popout=true&nick=${meuNick}`, 'ANBU_PANIC', `width=${width},height=${height},left=${left},top=0,menubar=no,status=no,toolbar=no`);
        };

        function configurarModoPopOut() {
            document.body.innerHTML = `
                <div id="popout-body" class="flex flex-col items-center justify-center h-screen bg-slate-950 p-4 border-2 border-slate-800 transition-all duration-300">
                    <p class="text-[10px] font-black mb-2 uppercase text-slate-500 italic">ANBU: ${meuNick}</p>
                    <button id="popout-btn" onclick="dispararAlerta()" class="w-full h-full rounded-2xl bg-slate-900 text-slate-700 font-black text-2xl border-2 border-slate-800 active:scale-90 transition-all shadow-inner uppercase tracking-tighter">
                        🚨 PÂNICO
                    </button>
                    <p id="alert-name" class="hidden mt-2 text-white font-bold text-center text-[10px] uppercase italic animate-pulse"></p>
                </div>
            `;
            iniciarMonitoramentoPopOut();
        }

        function iniciarMonitoramentoPopOut() {
            onSnapshot(doc(db, "panic_system", "status"), (snap) => {
                const d = snap.data();
                const body = document.getElementById('popout-body');
                const btn = document.getElementById('popout-btn');
                const name = document.getElementById('alert-name');
                if(d?.ativo) {
                    body.classList.add('neon-panic');
                    btn.classList.add('bg-red-600', 'text-white', 'border-white');
                    name.classList.remove('hidden');
                    name.textContent = `REFORÇO: ${d.por}`;
                } else {
                    body.classList.remove('neon-panic');
                    btn.classList.remove('bg-red-600', 'text-white', 'border-white');
                    name.classList.add('hidden');
                }
            });
            window.dispararAlerta = async () => {
                const ref = doc(db, "panic_system", "status");
                await setDoc(ref, { ativo: true, por: meuNick, time: Date.now() });
                setTimeout(() => updateDoc(ref, { ativo: false }), 12000);
            };
        }

        function iniciarMonitoramento() {
            onSnapshot(doc(db, "panic_system", "status"), (snap) => {
                const data = snap.data();
                const btn = document.getElementById('main-panic-btn');
                const card = document.getElementById('main-card');
                const msg = document.getElementById('panic-msg');
                
                if(data?.ativo) {
                    card.classList.add('neon-panic');
                    btn.classList.add('text-white', 'border-white');
                    btn.innerHTML = `🚨 APOIAR: ${data.por}!`;
                    msg.classList.remove('hidden');
                    msg.innerHTML = `ANBU <b>${data.por}</b> SOB ATAQUE!`;
                    playAlarm(); // CHAMA A FUNÇÃO DE TOCAR
                } else {
                    card.classList.remove('neon-panic');
                    btn.classList.remove('text-white', 'border-white');
                    btn.innerHTML = "🚨 DISPARAR PÂNICO";
                    msg.classList.add('hidden');
                    stopAlarm(); // CHAMA A FUNÇÃO DE PARAR
                }
            });

            onSnapshot(collection(db, "presenca_radio"), (snap) => {
                const lista = document.getElementById('online-list');
                lista.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.online && (Date.now() - d.timestamp < 60000)) {
                        lista.innerHTML += `<div class="bg-slate-800 px-2 py-1 rounded text-[10px] font-bold border border-slate-700 flex items-center"><span class="online-dot"></span>${d.id}</div>`;
                    }
                });
            });
        }

        async function atualizarPresenca(status) {
            if(!meuNick) return;
            await setDoc(doc(db, "presenca_radio", meuNick), { id: meuNick, online: status, timestamp: Date.now() }, { merge: true });
        }
    </script>
</body>
</html>
