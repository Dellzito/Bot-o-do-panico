<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pânico ANBU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; user-select: none; }
        
        /* O Efeito de Piscar em Vermelho (Alerta) */
        .alerta-piscando {
            animation: piscarForte 0.5s infinite alternate;
            background-color: #b91c1c !important; /* Vermelho escuro */
            border-color: #f87171 !important; /* Borda clara */
        }

        @keyframes piscarForte {
            0% { box-shadow: 0 0 10px #ef4444; transform: scale(1); }
            100% { box-shadow: 0 0 40px #ef4444, inset 0 0 20px #ef4444; transform: scale(1.02); }
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen p-4">

    <audio id="somAlerta" src="https://raw.githubusercontent.com/Dellzito/Bot-o-do-panico/main/cebolinha-bobo-do-outro-lado.mp3" preload="auto" loop></audio>

    <div id="tela-login" class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center border border-gray-700">
        <h1 class="text-3xl font-black text-red-500 mb-6">RÁDIO ANBU</h1>
        <input id="input-nick" type="text" placeholder="Digite seu Nick..." class="w-full p-4 rounded-xl bg-gray-900 border border-gray-600 mb-4 text-center text-xl font-bold uppercase focus:border-red-500 outline-none">
        <button onclick="fazerLogin()" class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-xl font-black text-lg transition shadow-lg">ENTRAR</button>
    </div>

    <div id="tela-audio" class="hidden bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center border border-yellow-600">
        <h2 class="text-xl font-bold text-yellow-500 mb-4">Atenção, Operador!</h2>
        <p class="text-gray-300 text-sm mb-6">Para ouvir os pedidos de ajuda, você precisa habilitar o som do seu rádio manualmente.</p>
        <button onclick="destravarAudio()" class="w-full bg-green-600 hover:bg-green-700 py-6 rounded-xl font-black text-xl transition shadow-[0_0_15px_#16a34a]">
            🔊 ATIVAR SOM AGORA
        </button>
        <button onclick="entrarMudo()" class="w-full mt-4 bg-gray-700 hover:bg-gray-600 py-3 rounded-xl font-bold text-sm text-gray-400 transition">
            Entrar Mudo (Não recomendado)
        </button>
    </div>

    <div id="tela-radio" class="hidden w-full max-w-md space-y-4">
        
        <div class="flex justify-between items-center bg-gray-800 p-4 rounded-xl border border-gray-700">
            <div>
                <span class="text-[10px] text-gray-400 uppercase tracking-widest block">Logado como:</span>
                <span id="meu-nick-display" class="font-black text-lg text-white uppercase"></span>
            </div>
            <div class="flex gap-2">
                <button onclick="abrirJanelaPequena()" class="bg-gray-700 px-4 py-2 rounded-lg font-bold hover:bg-gray-600 text-sm">🔲 Overlay</button>
                <button id="btn-mutar" onclick="mutarAudio()" class="bg-gray-700 px-4 py-2 rounded-lg font-bold hover:bg-gray-600 text-sm">🔊 Som ON</button>
            </div>
        </div>

        <button id="btn-panico" onclick="apertarPanico()" class="w-full bg-gray-900 border-2 border-gray-700 h-64 rounded-3xl flex flex-col items-center justify-center transition-all duration-200 active:scale-95 shadow-2xl relative overflow-hidden">
            <span class="text-5xl mb-2">🚨</span>
            <span id="texto-panico" class="font-black text-2xl text-gray-500 uppercase tracking-widest">DISPARAR PÂNICO</span>
            <span id="texto-quem-pediu" class="hidden mt-2 font-black text-white text-xl bg-black px-4 py-1 rounded-lg"></span>
        </button>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // SUAS CREDENCIAIS
        const firebaseConfig = {
            apiKey: "AIzaSyC-QaPr7O6RkWR3vpXCg4zrnUWw3TzU9ss",
            authDomain: "g-2cb53.firebaseapp.com",
            projectId: "g-2cb53",
            storageBucket: "g-2cb53.firebasestorage.app",
            messagingSenderId: "292095146978",
            appId: "1:292095146978:web:836d833230907d081017bb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // VARIÁVEIS DO SISTEMA
        let nickUsuario = "";
        let somLiberado = false;
        const elementoAudio = document.getElementById("somAlerta");

        // VERIFICA SE É A JANELINHA (OVERLAY)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('popout')) {
            nickUsuario = urlParams.get('nick');
            document.getElementById('tela-login').classList.add('hidden');
            montarLayoutPopOut();
        }

        // PASSO 1: LOGIN
        window.fazerLogin = () => {
            const input = document.getElementById("input-nick").value.trim().toUpperCase();
            if(!input) return alert("Digite seu nick!");
            nickUsuario = input;
            
            document.getElementById("tela-login").classList.add("hidden");
            document.getElementById("tela-audio").classList.remove("hidden"); // Exige clique para som
        };

        // PASSO 2: DESTRAVAR O ÁUDIO (A MÁGICA ACONTECE AQUI)
        window.destravarAudio = () => {
            somLiberado = true;
            elementoAudio.volume = 0; // Toca mudo só pro Chrome liberar
            elementoAudio.play().then(() => {
                elementoAudio.pause();
                elementoAudio.currentTime = 0;
                elementoAudio.volume = 1; // Volta o volume
                irParaRádio();
            }).catch(e => console.error("Erro no áudio:", e));
        };

        window.entrarMudo = () => {
            somLiberado = false;
            irParaRádio();
        };

        function irParaRádio() {
            document.getElementById("tela-audio").classList.add("hidden");
            document.getElementById("tela-radio").classList.remove("hidden");
            document.getElementById("meu-nick-display").innerText = nickUsuario;
            document.getElementById("btn-mutar").innerText = somLiberado ? "🔊 Som ON" : "🔇 Som OFF";
            
            escutarBancoDeDados();
        }

        // CONTROLE MANUAL DE SOM
        window.mutarAudio = () => {
            somLiberado = !somLiberado;
            document.getElementById("btn-mutar").innerText = somLiberado ? "🔊 Som ON" : "🔇 Som OFF";
            if(!somLiberado) {
                elementoAudio.pause();
                elementoAudio.currentTime = 0;
            } else {
                // Se ligou o som agora, destrava pro navegador
                elementoAudio.volume = 0;
                elementoAudio.play().then(() => { elementoAudio.pause(); elementoAudio.volume = 1; });
            }
        };

        // PASSO 3: QUANDO ALGUÉM APERTA O BOTÃO
        window.apertarPanico = async () => {
            if(!nickUsuario) return;
            const docRef = doc(db, "sistema_alerta", "status_atual");
            
            // Grava no Firebase: Pânico ON, e quem apertou
            await setDoc(docRef, { 
                alerta: true, 
                quemPediu: nickUsuario, 
                tempo: Date.now() 
            });

            // O pânico desliga sozinho em 10 segundos
            setTimeout(async () => {
                await setDoc(docRef, { alerta: false, quemPediu: "", tempo: Date.now() });
            }, 10000);
        };

        // PASSO 4: ESCUTAR O FIREBASE EM TEMPO REAL (TODOS OS PCS FAZEM ISSO)
        function escutarBancoDeDados() {
            onSnapshot(doc(db, "sistema_alerta", "status_atual"), (documento) => {
                const dados = documento.data();
                const botao = document.getElementById("btn-panico");
                const textoBtn = document.getElementById("texto-panico");
                const textoQuem = document.getElementById("texto-quem-pediu");

                if (dados && dados.alerta === true) {
                    // MODO PÂNICO ATIVADO!
                    botao.classList.add("alerta-piscando");
                    textoBtn.innerText = "ALERTA DE APOIO!";
                    textoBtn.classList.remove("text-gray-500");
                    textoBtn.classList.add("text-white");
                    
                    textoQuem.classList.remove("hidden");
                    textoQuem.innerText = `NINJA: ${dados.quemPediu}`;

                    // TOCA O SOM PARA TODOS QUE ESTÃO COM SOM LIBERADO
                    if (somLiberado) {
                        elementoAudio.currentTime = 0;
                        elementoAudio.play();
                    }

                } else {
                    // MODO PÂNICO DESATIVADO (PAZ)
                    botao.classList.remove("alerta-piscando");
                    textoBtn.innerText = "DISPARAR PÂNICO";
                    textoBtn.classList.add("text-gray-500");
                    textoBtn.classList.remove("text-white");
                    
                    textoQuem.classList.add("hidden");
                    textoQuem.innerText = "";

                    // PARA O SOM
                    elementoAudio.pause();
                    elementoAudio.currentTime = 0;
                }
            });
        }

        // --------------------------------------------------------
        // JANELA PEQUENA (OVERLAY) PARA JOGAR
        // --------------------------------------------------------
        window.abrirJanelaPequena = () => {
            const largura = 300;
            const altura = 350;
            const esquerda = window.screen.width - largura - 20;
            window.open(`${window.location.origin}${window.location.pathname}?popout=true&nick=${nickUsuario}`, 'ANBU_OVERLAY', `width=${largura},height=${altura},left=${esquerda},top=50`);
        };

        function montarLayoutPopOut() {
            document.body.innerHTML = `
                <div class="flex flex-col h-screen bg-gray-900 p-2">
                    <p class="text-center text-xs text-gray-400 font-bold mb-2">SISTEMA OVERLAY - ${nickUsuario}</p>
                    <button id="btn-panico" onclick="apertarPanico()" class="flex-grow bg-gray-800 border-2 border-gray-700 rounded-2xl flex flex-col items-center justify-center transition-all active:scale-95">
                        <span class="text-4xl mb-2">🚨</span>
                        <span id="texto-panico" class="font-black text-xl text-gray-500">PÂNICO</span>
                        <span id="texto-quem-pediu" class="hidden mt-2 font-bold text-white bg-black px-2 py-1 rounded text-sm"></span>
                    </button>
                </div>
            `;
            
            // O Popout não toca som, apenas pisca e envia o sinal (A aba principal por baixo cuida do som)
            window.apertarPanico = async () => {
                const docRef = doc(db, "sistema_alerta", "status_atual");
                await setDoc(docRef, { alerta: true, quemPediu: nickUsuario, tempo: Date.now() });
                setTimeout(() => setDoc(docRef, { alerta: false }), 10000);
            };

            // Escuta para piscar o overlay
            onSnapshot(doc(db, "sistema_alerta", "status_atual"), (documento) => {
                const dados = documento.data();
                const botao = document.getElementById("btn-panico");
                const textoBtn = document.getElementById("texto-panico");
                const textoQuem = document.getElementById("texto-quem-pediu");

                if (dados && dados.alerta === true) {
                    botao.classList.add("alerta-piscando");
                    textoBtn.innerText = "ALERTA!";
                    textoBtn.classList.replace("text-gray-500", "text-white");
                    textoQuem.classList.remove("hidden");
                    textoQuem.innerText = dados.quemPediu;
                } else {
                    botao.classList.remove("alerta-piscando");
                    textoBtn.innerText = "PÂNICO";
                    textoBtn.classList.replace("text-white", "text-gray-500");
                    textoQuem.classList.add("hidden");
                }
            });
        }
    </script>
</body>
</html>
