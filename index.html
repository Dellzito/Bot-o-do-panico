<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANBU - Rádio de Emergência</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f1f5f9; font-family: sans-serif; }
        .panic-active { animation: pulse-red 0.8s infinite; background: #ef4444 !important; border-color: white !important; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); transform: scale(1); }
        }
        .online-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 8px #22c55e; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div id="login-screen" class="bg-slate-900 p-8 rounded-2xl border border-slate-800 shadow-2xl w-full max-w-sm z-50">
        <h1 class="text-2xl font-bold text-red-500 mb-6 text-center uppercase tracking-tighter">Frequência ANBU</h1>
        <input id="nick-input" type="text" placeholder="Seu Nick" class="w-full p-4 rounded-xl bg-slate-800 border border-slate-700 mb-4 focus:outline-none focus:border-red-500 text-white font-bold">
        <button onclick="entrarNoRadio()" class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-xl font-bold transition shadow-lg">CONECTAR RÁDIO</button>
    </div>

    <div id="radio-panel" class="hidden w-full max-w-2xl space-y-4">
        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Operador</h2>
                    <p id="display-nick" class="text-xl font-black text-white italic"></p>
                </div>
                <div class="flex gap-2">
                    <button onclick="fazerPopOut()" class="p-3 bg-slate-800 rounded-xl border border-slate-700 text-blue-400" title="Destacar Botão">🔲</button>
                    <button onclick="toggleAudio()" id="audio-btn" class="p-3 bg-slate-800 rounded-xl border border-slate-700">🔇</button>
                </div>
            </div>

            <button id="main-panic-btn" onclick="dispararAlerta()" class="w-full py-20 rounded-2xl bg-slate-950 border-2 border-slate-800 text-2xl font-black text-slate-700 transition-all active:scale-95">
                🚨 DISPARAR PÂNICO
            </button>

            <div id="panic-msg" class="hidden mt-6 p-4 bg-red-600 text-white rounded-xl text-center font-black animate-bounce">
                ALERTA DE APOIO!
            </div>
        </div>

        <div class="bg-slate-900/50 border border-slate-800 rounded-3xl p-4">
            <div id="online-list" class="flex flex-wrap gap-2"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-QaPr7O6RkWR3vpXCg4zrnUWw3TzU9ss",
            authDomain: "g-2cb53.firebaseapp.com",
            projectId: "g-2cb53",
            storageBucket: "g-2cb53.firebasestorage.app",
            messagingSenderId: "292095146978",
            appId: "1:292095146978:web:836d833230907d081017bb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let meuNick = "";
        let audioLigado = false;
        const sirene = new Audio('https://cdn.pixabay.com/audio/2022/03/10/audio_507634f378.mp3'); 
        sirene.loop = true;

        // Verifica se é uma janela de Pop-out
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('popout')) {
            meuNick = urlParams.get('nick');
            configurarModoPopOut();
        }

        window.entrarNoRadio = () => {
            const nick = document.getElementById('nick-input').value.trim().toUpperCase();
            if(!nick) return alert("Identifique-se!");
            
            meuNick = nick;
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('radio-panel').classList.remove('hidden');
            document.getElementById('display-nick').textContent = meuNick;

            // Destrava áudio
            sirene.play().then(() => { sirene.pause(); audioLigado = true; atualizarBtnAudio(); });
            
            iniciarEscuta();
            atualizarPresenca(true);
            setInterval(() => atualizarPresenca(true), 30000);
        };

        window.toggleAudio = () => {
            audioLigado = !audioLigado;
            atualizarBtnAudio();
            if(!audioLigado) { sirene.pause(); sirene.currentTime = 0; }
        };

        function atualizarBtnAudio() {
            const btn = document.getElementById('audio-btn');
            btn.textContent = audioLigado ? '🔊' : '🔇';
            btn.classList.toggle('border-green-500', audioLigado);
        }

        window.dispararAlerta = async () => {
            const ref = doc(db, "panic_system", "status");
            await setDoc(ref, { ativo: true, por: meuNick, time: Date.now() });
            setTimeout(() => updateDoc(ref, { ativo: false }), 10000);
        };

        window.fazerPopOut = () => {
            const width = 250;
            const height = 300;
            const left = window.screen.width - width;
            window.open(`${window.location.origin}${window.location.pathname}?popout=true&nick=${meuNick}`, 'ANBU_PANIC', `width=${width},height=${height},left=${left},top=0,menubar=no,status=no,toolbar=no`);
        };

        function configurarModoPopOut() {
            document.body.innerHTML = `
                <div class="flex flex-col items-center justify-center h-screen bg-red-950 p-2 border-4 border-red-600">
                    <p class="text-[10px] font-black mb-2">ANBU: ${meuNick}</p>
                    <button id="main-panic-btn" onclick="dispararAlerta()" class="w-full h-full rounded-xl bg-red-600 text-white font-black text-2xl active:bg-red-800 shadow-inner">
                        🚨 PÂNICO
                    </button>
                </div>
            `;
            // No popout, só precisamos disparar, não ouvir som (a aba principal cuida disso)
            window.dispararAlerta = async () => {
                const ref = doc(db, "panic_system", "status");
                await setDoc(ref, { ativo: true, por: meuNick, time: Date.now() });
                setTimeout(() => updateDoc(ref, { ativo: false }), 10000);
            };
        }

        function iniciarEscuta() {
            onSnapshot(doc(db, "panic_system", "status"), (snap) => {
                const data = snap.data();
                const btn = document.getElementById('main-panic-btn');
                const msg = document.getElementById('panic-msg');
                if(data?.ativo) {
                    btn.classList.add('panic-active');
                    btn.innerHTML = `🚨 APOIAR: ${data.por}!`;
                    msg.classList.remove('hidden');
                    msg.innerHTML = `ANBU <b>${data.por}</b> EM PERIGO!`;
                    if(audioLigado) sirene.play();
                } else {
                    btn.classList.remove('panic-active');
                    btn.innerHTML = "🚨 DISPARAR PÂNICO";
                    msg.classList.add('hidden');
                    sirene.pause(); sirene.currentTime = 0;
                }
            });

            onSnapshot(collection(db, "presenca_radio"), (snap) => {
                const lista = document.getElementById('online-list');
                lista.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.online && (Date.now() - d.timestamp < 60000)) {
                        lista.innerHTML += `<div class="bg-slate-800 px-2 py-1 rounded text-[10px] font-bold border border-slate-700"><span class="online-dot"></span>${d.id}</div>`;
                    }
                });
            });
        }

        async function atualizarPresenca(status) {
            if(!meuNick) return;
            await setDoc(doc(db, "presenca_radio", meuNick), { id: meuNick, online: status, timestamp: Date.now() }, { merge: true });
        }

        window.onbeforeunload = () => atualizarPresenca(false);
    </script>
</body>
</html>
