<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pânico ANBU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; user-select: none; overflow: hidden; }
        
        .alerta-piscando {
            animation: piscarForte 0.5s infinite alternate;
            background-color: #dc2626 !important;
            border: 4px solid #fca5a5 !important;
        }

        @keyframes piscarForte {
            0% { box-shadow: 0 0 10px #ef4444; transform: scale(1); }
            100% { box-shadow: 0 0 50px #ef4444, inset 0 0 20px #ef4444; transform: scale(1.02); }
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen p-4">

    <div id="tela-login" class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center border border-gray-700 z-50">
        <h1 class="text-3xl font-black text-red-500 mb-6">RÁDIO ANBU</h1>
        <input id="input-nick" type="text" placeholder="SEU NICK..." class="w-full p-4 rounded-xl bg-gray-900 border border-gray-600 mb-4 text-center text-xl font-bold uppercase focus:border-red-500 outline-none">
        <button onclick="iniciarSistema()" class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-xl font-black text-lg transition shadow-lg">CONECTAR</button>
    </div>

    <div id="tela-radio" class="hidden w-full max-w-md space-y-4">
        <div class="flex justify-between items-center bg-gray-800 p-4 rounded-xl border border-gray-700">
            <div>
                <span class="text-[10px] text-gray-400 uppercase tracking-widest block">Operador:</span>
                <span id="nick-display" class="font-black text-xl text-white uppercase"></span>
            </div>
            <div class="flex gap-2">
                <button onclick="abrirPopout()" class="bg-gray-700 px-4 py-3 rounded-lg font-bold hover:bg-gray-600 text-sm" title="Modo Overlay">🔲</button>
                <button id="btn-som" onclick="alternarSom()" class="bg-green-600 px-4 py-3 rounded-lg font-bold hover:bg-green-500 text-sm transition-colors shadow-[0_0_10px_#16a34a]">🔊 SOM LIGADO</button>
            </div>
        </div>

        <button id="btn-panico" onclick="enviarAlerta()" class="w-full bg-gray-900 border-2 border-gray-700 h-72 rounded-3xl flex flex-col items-center justify-center transition-all duration-200 active:scale-95 shadow-2xl relative">
            <span class="text-6xl mb-4">🚨</span>
            <span id="texto-panico" class="font-black text-3xl text-gray-500 uppercase tracking-widest">PÂNICO</span>
            <span id="texto-quem" class="hidden mt-4 font-black text-white text-2xl bg-black px-6 py-2 rounded-xl"></span>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC-QaPr7O6RkWR3vpXCg4zrnUWw3TzU9ss",
            authDomain: "g-2cb53.firebaseapp.com",
            projectId: "g-2cb53",
            storageBucket: "g-2cb53.firebasestorage.app",
            messagingSenderId: "292095146978",
            appId: "1:292095146978:web:836d833230907d081017bb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let meuNick = "";
        let somLigado = true; // Já começa liberado após o login
        let estadoPanico = false;

        // O SEGREDO DO ÁUDIO: Link via jsDelivr (Não trava) e criado via JS
        const linkAudio = "https://cdn.jsdelivr.net/gh/Dellzito/Bot-o-do-panico@main/cebolinha-bobo-do-outro-lado.mp3";
        const alarme = new Audio(linkAudio);
        alarme.loop = true;

        // VERIFICA SE É O POPOUT
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('popout')) {
            meuNick = urlParams.get('nick');
            document.getElementById('tela-login').classList.add('hidden');
            iniciarModoPopout();
        }

        // 1. ENTRAR NO SISTEMA
        window.iniciarSistema = () => {
            const input = document.getElementById("input-nick").value.trim().toUpperCase();
            if(!input) return alert("Identifique-se!");
            
            meuNick = input;
            document.getElementById("tela-login").classList.add("hidden");
            document.getElementById("tela-radio").classList.remove("hidden");
            document.getElementById("nick-display").innerText = meuNick;

            // O simples fato de chamar .load() num clique do usuário desbloqueia o som no Chrome
            alarme.load(); 

            escutarAlertaGlobal();
        };

        // 2. CONTROLE DE SOM (Botão do topo)
        window.alternarSom = () => {
            somLigado = !somLigado;
            const btn = document.getElementById("btn-som");
            
            if (somLigado) {
                btn.innerText = "🔊 SOM LIGADO";
                btn.className = "bg-green-600 px-4 py-3 rounded-lg font-bold hover:bg-green-500 text-sm transition-colors shadow-[0_0_10px_#16a34a]";
                // Se ligou o som e o pânico estiver rolando, toca na hora
                if (estadoPanico) alarme.play().catch(e => console.log(e));
            } else {
                btn.innerText = "🔇 SOM DESLIGADO";
                btn.className = "bg-gray-700 px-4 py-3 rounded-lg font-bold hover:bg-gray-600 text-sm transition-colors";
                alarme.pause();
                alarme.currentTime = 0;
            }
        };

        // 3. ENVIAR O SINAL DE PÂNICO
        window.enviarAlerta = async () => {
            if(!meuNick) return;
            const ref = doc(db, "sistema_alerta", "status");
            await setDoc(ref, { alerta: true, quem: meuNick, timestamp: Date.now() });
            
            // Desliga em 12 segundos
            setTimeout(() => setDoc(ref, { alerta: false }), 12000);
        };

        // 4. OUVIR O SINAL DE TODOS (Onde o som realmente toca)
        function escutarAlertaGlobal() {
            onSnapshot(doc(db, "sistema_alerta", "status"), (documento) => {
                const dados = documento.data();
                const botao = document.getElementById("btn-panico");
                const txtPanico = document.getElementById("texto-panico");
                const txtQuem = document.getElementById("texto-quem");

                if (dados && dados.alerta === true) {
                    estadoPanico = true;
                    
                    // Visual
                    botao.classList.add("alerta-piscando");
                    txtPanico.innerText = "APOIAR NINJA!";
                    txtPanico.classList.replace("text-gray-500", "text-white");
                    txtQuem.innerText = dados.quem;
                    txtQuem.classList.remove("hidden");

                    // Tocar Áudio (sem hacks, play direto)
                    if (somLigado) {
                        alarme.play().catch(e => console.error("Erro ao tocar alarme:", e));
                    }
                } else {
                    estadoPanico = false;
                    
                    // Visual
                    botao.classList.remove("alerta-piscando");
                    txtPanico.innerText = "PÂNICO";
                    txtPanico.classList.replace("text-white", "text-gray-500");
                    txtQuem.classList.add("hidden");

                    // Parar Áudio
                    alarme.pause();
                    alarme.currentTime = 0;
                }
            });
        }

        // 5. MODO JANELINHA (OVERLAY)
        window.abrirPopout = () => {
            const w = 250, h = 300;
            const l = window.screen.width - w;
            window.open(`${window.location.origin}${window.location.pathname}?popout=true&nick=${meuNick}`, 'ANBU_OVERLAY', `width=${w},height=${h},left=${l},top=0`);
        };

        function iniciarModoPopout() {
            document.body.innerHTML = `
                <div class="flex flex-col h-screen bg-gray-900 p-3 border-4 border-gray-800 transition-colors duration-200" id="bg-popout">
                    <p class="text-center text-[10px] text-gray-500 font-black mb-2 uppercase">Overlay - ${meuNick}</p>
                    <button id="btn-panico-pop" onclick="enviarAlerta()" class="flex-grow bg-gray-800 border-2 border-gray-700 rounded-2xl flex flex-col items-center justify-center transition-all active:scale-95 shadow-inner">
                        <span class="text-4xl mb-2">🚨</span>
                        <span id="txt-pop" class="font-black text-2xl text-gray-500">PÂNICO</span>
                        <span id="txt-quem-pop" class="hidden mt-2 font-bold text-white bg-black px-2 py-1 rounded text-sm"></span>
                    </button>
                </div>
            `;

            window.enviarAlerta = async () => {
                const ref = doc(db, "sistema_alerta", "status");
                await setDoc(ref, { alerta: true, quem: meuNick, timestamp: Date.now() });
                setTimeout(() => setDoc(ref, { alerta: false }), 12000);
            };

            onSnapshot(doc(db, "sistema_alerta", "status"), (documento) => {
                const dados = documento.data();
                const bg = document.getElementById("bg-popout");
                const btn = document.getElementById("btn-panico-pop");
                const txt = document.getElementById("txt-pop");
                const txtQuem = document.getElementById("txt-quem-pop");

                if (dados && dados.alerta === true) {
                    bg.classList.add("alerta-piscando", "border-red-500");
                    txt.innerText = "ALERTA!";
                    txt.classList.replace("text-gray-500", "text-white");
                    txtQuem.innerText = dados.quem;
                    txtQuem.classList.remove("hidden");
                } else {
                    bg.classList.remove("alerta-piscando", "border-red-500");
                    txt.innerText = "PÂNICO";
                    txt.classList.replace("text-white", "text-gray-500");
                    txtQuem.classList.add("hidden");
                }
            });
        }
    </script>
</body>
</html>
